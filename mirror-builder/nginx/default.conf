server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    # Emit relative Location headers (just "/docs/"), not an absolute
    # scheme://host:port URL nginx reconstructs itself — the reconstructed
    # host can drop a non-default port depending on how the request arrived.
    absolute_redirect off;

    # Liveness/readiness probe for orchestrators and load balancers.
    # Deliberately not served from the static root, so it works even if
    # dist/ is empty or mid-rebuild.
    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # Human-facing landing page. The installer plugin never fetches "/" —
    # it always requests explicit paths (/index.json, /plugins/<repo>/…),
    # so redirecting the bare root here doesn't affect it.
    location = / {
        return 302 /docs/;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
